services:
  imap-spam-cleaner-run-once:
    profiles:
      - run-once
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: local
    image: imap-spam-cleaner:local
    container_name: imap-spam-cleaner-run-once
    hostname: imap-spam-cleaner-run-once
    restart: "no"
    command:
      - -now
      - -analyze-only
    volumes:
      - ./.config.yml:/app/config.yml:ro